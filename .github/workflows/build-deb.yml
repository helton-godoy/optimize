name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    name: Shell quality and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install development tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            npm \
            shellcheck \
            shfmt
          if apt-cache show bash-language-server >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends bash-language-server
          else
            sudo npm install -g bash-language-server
          fi

      - name: Run checks
        run: make check

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if changelog changed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD | grep -q "debian/changelog"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            debhelper-compat \
            devscripts \
            dpkg-dev \
            fakeroot \
            gettext \
            gettext-base

      - name: Validate changelog
        run: dpkg-parsechangelog -l debian/changelog

      - name: Extract version and release notes
        id: version
        run: |
          CHANGELOG_LINE=$(head -1 debian/changelog)
          PKG_NAME=$(echo "$CHANGELOG_LINE" | cut -d' ' -f1)
          FULL_VERSION=$(echo "$CHANGELOG_LINE" | cut -d'(' -f2 | cut -d')' -f1)
          UPSTREAM_VERSION=$(echo "$FULL_VERSION" | sed 's/-[0-9]*$//')

          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"

          RELEASE_NOTES=$(awk '
            /^[a-zA-Z].*\(/ { if (found) exit; found=1; next }
            /^ --/ { next }
            found && /^[[:space:]]*$/ { print ""; next }
            found && /^[[:space:]]+\*/ {
              sub(/^[[:space:]]+\*[[:space:]]*/, "- ")
              print
              next
            }
            found { sub(/^[[:space:]]{2}/, "  "); print }
          ' debian/changelog)

          {
            echo "release_notes<<RELEASE_NOTES_EOF"
            echo "$RELEASE_NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          dpkg-buildpackage -us -uc -b
          cp ../*.deb ../*.changes .

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimize-${{ steps.version.outputs.upstream_version }}
          path: |
            optimize_*.deb
            optimize_*.changes
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: "optimize ${{ steps.version.outputs.upstream_version }}"
          body: |
            ## Changelog

            ${{ steps.version.outputs.release_notes }}

            ---

            **Instalacao:**

            ```bash
            sudo apt-get install ./optimize_${{ steps.version.outputs.full_version }}_all.deb
            ```
          files: |
            optimize_${{ steps.version.outputs.full_version }}_all.deb
            optimize_${{ steps.version.outputs.full_version }}_all.changes
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
